<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Smart Timetable System — My Timetables</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>

<style>
  :root{--bg:#0a0a0f;--surface:#111118;--surface2:#16161f;--border:#1e1e2e;--accent:#7c6aff;--accent2:#ff6ab0;--accent3:#4dffa4;--text:#e8e8f0;--muted:#6666aa;--error:#ff6a6a}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(124,106,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(124,106,255,.025) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
  .topbar{display:flex;align-items:center;gap:16px;padding:18px 40px;border-bottom:1px solid var(--border);background:rgba(10,10,15,.9);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
  .back-btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;padding:7px 14px;border-radius:8px;cursor:pointer;transition:all .2s}
  .back-btn:hover{border-color:var(--accent);color:var(--accent)}
  .page-title{font-family:'Syne',sans-serif;font-weight:800;font-size:15px}
  .main{max-width:900px;margin:0 auto;padding:56px 40px}
  .section-title{font-family:'Syne',sans-serif;font-weight:800;font-size:36px;background:linear-gradient(135deg,var(--text),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
  .section-sub{font-size:12px;color:var(--muted);margin-bottom:44px}
  .tab-bar{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:5px;margin-bottom:36px;width:fit-content}
  .tab-btn{padding:9px 20px;background:none;border:none;color:var(--muted);font-family:'Syne',sans-serif;font-weight:700;font-size:12px;letter-spacing:.5px;border-radius:8px;cursor:pointer;transition:all .2s}
  .tab-btn.active{background:var(--accent);color:#fff;box-shadow:0 4px 16px rgba(124,106,255,.35)}
  .panel{display:none;animation:fadeIn .3s ease}
  .panel.active{display:block}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .file-list{display:flex;flex-direction:column;gap:12px;margin-bottom:24px}
  .file-item{display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 22px;gap:16px;transition:border-color .2s;cursor:default;position:relative;overflow:hidden}
  .file-item:hover{border-color:var(--accent)}
  .file-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);opacity:0;transition:opacity .2s}
  .file-item:hover::before{opacity:1}
  .file-icon{font-size:22px;flex-shrink:0}
  .file-name{flex:1;font-size:13px;color:var(--text)}
  .file-meta{font-size:11px;color:var(--muted);margin-top:3px}
  .file-actions{display:flex;gap:8px}
  .action-btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;padding:6px 12px;border-radius:7px;cursor:pointer;transition:all .2s}
  .action-btn.view:hover{border-color:var(--accent);color:var(--accent)}
  .action-btn.delete:hover{border-color:var(--error);color:var(--error)}
  .empty-state{text-align:center;padding:80px 40px;color:var(--muted)}
  .empty-state .icon{font-size:48px;margin-bottom:16px;opacity:.5}
  .empty-state p{font-size:13px}
  .tt-display{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-top:16px}
  .tt-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .tt-header h3{font-family:'Syne',sans-serif;font-weight:700;font-size:14px}
  .tt-body{overflow-x:auto;padding:20px}
  pre{font-size:12px;line-height:1.8;color:var(--text);white-space:pre-wrap;font-family:'DM Mono',monospace}
  .load-form{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px}
  label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  input[type="text"]{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:14px;padding:13px 16px;border-radius:10px;outline:none;margin-bottom:20px;transition:border-color .2s,box-shadow .2s}
  input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,106,255,.15)}
  .btn{padding:12px 24px;border:none;border-radius:10px;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;letter-spacing:1px;cursor:pointer;transition:all .2s}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(124,106,255,.4)}
  .btn-danger{background:rgba(255,106,106,.15);border:1px solid rgba(255,106,106,.35);color:var(--error)}
  .btn-danger:hover{background:rgba(255,106,106,.25)}
  .msg{padding:12px 16px;border-radius:8px;font-size:12px;margin-top:16px;display:none}
  .msg.show{display:block;animation:fadeIn .3s ease}
  .msg.success{background:rgba(77,255,164,.08);border:1px solid rgba(77,255,164,.25);color:var(--accent3)}
  .msg.error{background:rgba(255,106,106,.08);border:1px solid rgba(255,106,106,.25);color:var(--error)}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(124,106,255,.3);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>

</head>
<body>
<div class="topbar">
  <button class="back-btn" onclick="window.location.href='dashboard.html'">← Back</button>
  <div class="page-title">My Timetables</div>
</div>

<div class="main">
  <div class="section-title">Timetable Manager</div>
  <p class="section-sub">Browse, view, and manage your saved timetable files.</p>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('list')">📋 List Files</button>
    <button class="tab-btn" onclick="switchTab('load')">📂 Load by Name</button>
    <button class="tab-btn" onclick="switchTab('delete')">🗑️ Delete File</button>
  </div>

  <!-- LIST PANEL -->
  <div class="panel active" id="panel-list">
    <div class="file-list" id="fileList">
      <div class="empty-state"><div class="spinner"></div><p>Loading files...</p></div>
    </div>
    <div class="tt-display" id="ttDisplay" style="display:none;">
      <div class="tt-header">
        <h3 id="ttFileName">—</h3>
        <button class="action-btn" onclick="closePreview()">✕ Close</button>
      </div>
      <div class="tt-body"><pre id="ttContent"></pre></div>
    </div>
  </div>

  <!-- LOAD PANEL -->
  <div class="panel" id="panel-load">
    <div class="load-form">
      <label>Filename</label>
      <input type="text" id="loadFilename" placeholder="timetable_user1.txt"/>
      <button class="btn-primary" id="loadBtn" onclick="loadFile()">Load Timetable</button>
      <div class="msg" id="load-msg"></div>
    </div>
    <div class="tt-display" id="loadDisplay" style="display:none;margin-top:20px;">
      <div class="tt-header"><h3 id="loadedFileName">—</h3></div>
      <div class="tt-body"><pre id="loadedContent"></pre></div>
    </div>
  </div>

  <!-- DELETE PANEL -->
  <div class="panel" id="panel-delete">
    <div class="load-form">
      <label>Filename to Delete</label>
      <input type="text" id="deleteFilename" placeholder="timetable_user1.txt"/>
      <button class="btn-danger" id="deleteBtn" onclick="deleteFile()">🗑️ Delete File</button>
      <div class="msg" id="delete-msg"></div>
    </div>
  </div>
</div>

<script>
  const API   = 'http://localhost:3000/api';
  const token = localStorage.getItem('sts_token');
  if (!token) window.location.href = 'auth.html';

  function authHeaders() {
    return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };
  }

  let filesCache = [];

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', ['list','load','delete'][i] === tab);
    });
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + tab).classList.add('active');
  }

  function showMsg(id, type, text) {
    const el = document.getElementById(id);
    el.className = 'msg ' + type + ' show';
    el.textContent = text;
  }

  async function fetchFiles() {
    try {
      const res  = await fetch(`${API}/timetables`, { headers: authHeaders() });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      filesCache = data;
      renderFileList();
    } catch (e) {
      document.getElementById('fileList').innerHTML =
        `<div class="empty-state"><p>❌ Failed to load files: ${e.message}</p></div>`;
    }
  }

  function renderFileList() {
    const container = document.getElementById('fileList');
    if (filesCache.length === 0) {
      container.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>No saved timetables found.</p></div>`;
      return;
    }
    container.innerHTML = filesCache.map((f, i) => `
      <div class="file-item">
        <div class="file-icon">📄</div>
        <div style="flex:1;">
          <div class="file-name">${f.name}</div>
          <div class="file-meta">Owner: ${f.owner} · ${f.date}</div>
        </div>
        <div class="file-actions">
          <button class="action-btn view" onclick="previewFile('${f.name}')">View</button>
          <button class="action-btn delete" onclick="deleteFromList('${f.name}')">Delete</button>
        </div>
      </div>`).join('');
  }

  async function previewFile(filename) {
    document.getElementById('ttFileName').textContent = filename;
    document.getElementById('ttContent').textContent  = 'Loading...';
    document.getElementById('ttDisplay').style.display = 'block';
    document.getElementById('ttDisplay').scrollIntoView({ behavior:'smooth', block:'start' });

    try {
      const res  = await fetch(`${API}/timetables/${encodeURIComponent(filename)}`, { headers: authHeaders() });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      document.getElementById('ttContent').textContent = data.content;
    } catch (e) {
      document.getElementById('ttContent').textContent = '❌ ' + e.message;
    }
  }

  function closePreview() {
    document.getElementById('ttDisplay').style.display = 'none';
  }

  async function deleteFromList(filename) {
    if (!confirm(`Delete "${filename}"?`)) return;
    try {
      const res  = await fetch(`${API}/timetables/${encodeURIComponent(filename)}`, {
        method: 'DELETE', headers: authHeaders()
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      filesCache = filesCache.filter(f => f.name !== filename);
      renderFileList();
      closePreview();
    } catch (e) {
      alert('❌ ' + e.message);
    }
  }

  async function loadFile() {
    const fname = document.getElementById('loadFilename').value.trim();
    if (!fname) return showMsg('load-msg', 'error', '❌ Enter a filename.');

    const btn = document.getElementById('loadBtn');
    btn.disabled = true; btn.textContent = 'Loading...';

    try {
      const res  = await fetch(`${API}/timetables/${encodeURIComponent(fname)}`, { headers: authHeaders() });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      document.getElementById('loadedFileName').textContent = fname;
      document.getElementById('loadedContent').textContent  = data.content;
      document.getElementById('loadDisplay').style.display  = 'block';
      showMsg('load-msg', 'success', '✅ Timetable loaded.');
    } catch (e) {
      showMsg('load-msg', 'error', '❌ ' + e.message);
    } finally {
      btn.disabled = false; btn.textContent = 'Load Timetable';
    }
  }

  async function deleteFile() {
    const fname = document.getElementById('deleteFilename').value.trim();
    if (!fname) return showMsg('delete-msg', 'error', '❌ Enter a filename.');
    if (!confirm(`Delete "${fname}"?`)) return;

    const btn = document.getElementById('deleteBtn');
    btn.disabled = true;

    try {
      const res  = await fetch(`${API}/timetables/${encodeURIComponent(fname)}`, {
        method: 'DELETE', headers: authHeaders()
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      showMsg('delete-msg', 'success', '✅ File deleted successfully.');
      filesCache = filesCache.filter(f => f.name !== fname);
    } catch (e) {
      showMsg('delete-msg', 'error', '❌ ' + e.message);
    } finally {
      btn.disabled = false;
    }
  }

  // Initial load
  fetchFiles();
</script>
</body>
</html>
