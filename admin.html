<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart Timetable System — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root{--bg:#0a0a0f;--surface:#111118;--surface2:#16161f;--border:#1e1e2e;--accent:#7c6aff;--accent2:#ff6ab0;--accent3:#4dffa4;--text:#e8e8f0;--muted:#6666aa;--error:#ff6a6a;--warn:#ffb86a}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,106,176,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,106,176,.025) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
  .topbar{display:flex;align-items:center;gap:16px;padding:18px 40px;border-bottom:1px solid var(--border);background:rgba(10,10,15,.9);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
  .back-btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;padding:7px 14px;border-radius:8px;cursor:pointer;transition:all .2s}
  .back-btn:hover{border-color:var(--accent2);color:var(--accent2)}
  .page-title{font-family:'Syne',sans-serif;font-weight:800;font-size:15px}
  .admin-badge{margin-left:auto;background:rgba(255,106,176,.12);border:1px solid rgba(255,106,176,.3);color:var(--accent2);font-family:'Syne',sans-serif;font-weight:700;font-size:10px;letter-spacing:2px;padding:5px 12px;border-radius:20px}
  .main{max-width:960px;margin:0 auto;padding:56px 40px}
  .section-title{font-family:'Syne',sans-serif;font-weight:800;font-size:36px;background:linear-gradient(135deg,var(--text),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
  .section-sub{font-size:12px;color:var(--muted);margin-bottom:44px}
  .tab-bar{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:5px;margin-bottom:36px;width:fit-content}
  .tab-btn{padding:9px 20px;background:none;border:none;color:var(--muted);font-family:'Syne',sans-serif;font-weight:700;font-size:12px;letter-spacing:.5px;border-radius:8px;cursor:pointer;transition:all .2s}
  .tab-btn.active{background:var(--accent2);color:#fff;box-shadow:0 4px 16px rgba(255,106,176,.35)}
  .panel{display:none;animation:fadeIn .3s ease}
  .panel.active{display:block}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:32px}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px 22px;animation:fadeIn .4s ease}
  .stat-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  .stat-value{font-family:'Syne',sans-serif;font-weight:800;font-size:36px}
  .stat-card:nth-child(1) .stat-value{color:var(--accent)}
  .stat-card:nth-child(2) .stat-value{color:var(--accent3)}
  .stat-card:nth-child(3) .stat-value{color:var(--accent2)}
  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden}
  .table-head{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .table-head h3{font-family:'Syne',sans-serif;font-weight:700;font-size:14px}
  table{width:100%;border-collapse:collapse}
  thead th{background:rgba(255,106,176,.07);color:var(--accent2);padding:12px 20px;text-align:left;font-family:'Syne',sans-serif;font-weight:700;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;border-bottom:1px solid var(--border)}
  tbody tr{border-bottom:1px solid var(--border);transition:background .2s}
  tbody tr:last-child{border-bottom:none}
  tbody tr:hover{background:rgba(255,255,255,.02)}
  tbody td{padding:14px 20px;font-size:13px;vertical-align:middle}
  .role-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-family:'Syne',sans-serif;font-weight:700;font-size:10px;letter-spacing:1px}
  .role-admin{background:rgba(255,106,176,.15);border:1px solid rgba(255,106,176,.35);color:var(--accent2)}
  .role-user{background:rgba(124,106,255,.15);border:1px solid rgba(124,106,255,.35);color:var(--accent)}
  .action-btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;padding:6px 12px;border-radius:7px;cursor:pointer;transition:all .2s}
  .action-btn.delete:hover{border-color:var(--error);color:var(--error)}
  .file-list{display:flex;flex-direction:column;gap:12px}
  .file-row{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;transition:border-color .2s}
  .file-row:hover{border-color:rgba(255,106,176,.3)}
  .file-icon{font-size:18px}
  .file-info{flex:1}
  .file-name{font-size:13px}
  .file-owner{font-size:11px;color:var(--muted);margin-top:3px}
  .delete-form{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px}
  label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  input[type="text"]{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:14px;padding:13px 16px;border-radius:10px;outline:none;margin-bottom:20px;transition:border-color .2s,box-shadow .2s}
  input:focus{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(255,106,176,.12)}
  .btn{padding:12px 24px;border:none;border-radius:10px;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;letter-spacing:1px;cursor:pointer;transition:all .2s}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn-danger{background:rgba(255,106,106,.15);border:1px solid rgba(255,106,106,.35);color:var(--error)}
  .btn-danger:hover{background:rgba(255,106,106,.25);transform:translateY(-1px)}
  .msg{padding:12px 16px;border-radius:8px;font-size:12px;margin-top:16px;display:none}
  .msg.show{display:block;animation:fadeIn .3s ease}
  .msg.success{background:rgba(77,255,164,.08);border:1px solid rgba(77,255,164,.25);color:var(--accent3)}
  .msg.error{background:rgba(255,106,106,.08);border:1px solid rgba(255,106,106,.25);color:var(--error)}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,106,176,.3);border-top-color:var(--accent2);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .empty{text-align:center;padding:40px;color:var(--muted);font-size:13px}
</style>
</head>
<body>
<div class="topbar">
  <button class="back-btn" onclick="window.location.href='dashboard.html'">← Back</button>
  <div class="page-title">Admin Panel</div>
  <div class="admin-badge">🛡️ ADMIN</div>
</div>

<div class="main">
  <div class="section-title">Admin Control</div>
  <p class="section-sub">Manage users and all timetable files in the system.</p>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-label">Total Users</div><div class="stat-value" id="totalUsers">—</div></div>
    <div class="stat-card"><div class="stat-label">Regular Users</div><div class="stat-value" id="totalRegular">—</div></div>
    <div class="stat-card"><div class="stat-label">Timetable Files</div><div class="stat-value" id="totalFiles">—</div></div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('users')">👥 View Users</button>
    <button class="tab-btn" onclick="switchTab('del-user')">🗑️ Delete User</button>
    <button class="tab-btn" onclick="switchTab('timetables')">📁 Timetable Files</button>
    <button class="tab-btn" onclick="switchTab('del-tt')">✂️ Delete Timetable</button>
  </div>

  <!-- VIEW USERS -->
  <div class="panel active" id="panel-users">
    <div class="table-wrap">
      <div class="table-head">
        <h3>All Users</h3>
        <span style="font-size:11px;color:var(--muted);">From users.txt</span>
      </div>
      <table>
        <thead><tr><th>#</th><th>Username</th><th>Role</th><th>Actions</th></tr></thead>
        <tbody id="usersTableBody"><tr><td colspan="4" class="empty"><span class="spinner"></span>Loading...</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- DELETE USER -->
  <div class="panel" id="panel-del-user">
    <div class="delete-form">
      <label>Username to Delete</label>
      <input type="text" id="delUserInput" placeholder="username"/>
      <button class="btn btn-danger" id="delUserBtn" onclick="deleteUser()">🗑️ Delete User</button>
      <div class="msg" id="del-user-msg"></div>
    </div>
  </div>

  <!-- ALL TIMETABLES -->
  <div class="panel" id="panel-timetables">
    <div class="file-list" id="allFilesList">
      <div class="empty"><span class="spinner"></span>Loading...</div>
    </div>
  </div>

  <!-- DELETE TIMETABLE -->
  <div class="panel" id="panel-del-tt">
    <div class="delete-form">
      <label>Filename to Delete</label>
      <input type="text" id="delTTInput" placeholder="timetable_user1.txt"/>
      <button class="btn btn-danger" id="delTTBtn" onclick="deleteTimetable()">🗑️ Delete File</button>
      <div class="msg" id="del-tt-msg"></div>
    </div>
  </div>
</div>

<script>
  const API   = 'http://localhost:3000/api';
  const token = localStorage.getItem('sts_token');
  const role  = localStorage.getItem('sts_role');

  // Guard: admin only
  if (!token || role !== 'admin') window.location.href = 'dashboard.html';

  function authHeaders() {
    return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };
  }

  let usersCache = [];
  let filesCache = [];

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', ['users','del-user','timetables','del-tt'][i] === tab);
    });
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + tab).classList.add('active');
  }

  function showMsg(id, type, text) {
    const el = document.getElementById(id);
    el.className = 'msg ' + type + ' show';
    el.textContent = text;
  }

  function updateStats() {
    document.getElementById('totalUsers').textContent   = usersCache.length;
    document.getElementById('totalRegular').textContent = usersCache.filter(u => u.role === 'user').length;
    document.getElementById('totalFiles').textContent   = filesCache.length;
  }

  // ── Fetch Users ──────────────────────────────
  async function fetchUsers() {
    try {
      const res  = await fetch(`${API}/users`, { headers: authHeaders() });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      usersCache = data;
      renderUsers();
      updateStats();
    } catch (e) {
      document.getElementById('usersTableBody').innerHTML =
        `<tr><td colspan="4" class="empty">❌ ${e.message}</td></tr>`;
    }
  }

  function renderUsers() {
    const tbody = document.getElementById('usersTableBody');
    if (usersCache.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" class="empty">No users found.</td></tr>';
      return;
    }
    tbody.innerHTML = usersCache.map((u, i) => `
      <tr>
        <td style="color:var(--muted)">${i + 1}</td>
        <td>${u.username}</td>
        <td><span class="role-badge role-${u.role}">${u.role}</span></td>
        <td>${u.role !== 'admin'
          ? `<button class="action-btn delete" onclick="quickDeleteUser('${u.username}')">Delete</button>`
          : '<span style="color:var(--muted);font-size:11px;">Protected</span>'}</td>
      </tr>`).join('');
  }

  async function quickDeleteUser(username) {
    if (!confirm(`Delete user "${username}"?`)) return;
    try {
      const res  = await fetch(`${API}/users/${encodeURIComponent(username)}`, {
        method: 'DELETE', headers: authHeaders()
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      usersCache = usersCache.filter(u => u.username !== username);
      renderUsers();
      updateStats();
    } catch (e) { alert('❌ ' + e.message); }
  }

  async function deleteUser() {
    const username = document.getElementById('delUserInput').value.trim();
    if (!username) return showMsg('del-user-msg', 'error', '❌ Enter a username.');
    if (!confirm(`Delete user "${username}"?`)) return;

    const btn = document.getElementById('delUserBtn');
    btn.disabled = true;
    try {
      const res  = await fetch(`${API}/users/${encodeURIComponent(username)}`, {
        method: 'DELETE', headers: authHeaders()
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      usersCache = usersCache.filter(u => u.username !== username);
      renderUsers();
      updateStats();
      showMsg('del-user-msg', 'success', '✅ User deleted successfully.');
    } catch (e) {
      showMsg('del-user-msg', 'error', '❌ ' + e.message);
    } finally { btn.disabled = false; }
  }

  // ── Fetch Timetables ─────────────────────────
  async function fetchFiles() {
    try {
      const res  = await fetch(`${API}/timetables`, { headers: authHeaders() });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      filesCache = data;
      renderFiles();
      updateStats();
    } catch (e) {
      document.getElementById('allFilesList').innerHTML = `<div class="empty">❌ ${e.message}</div>`;
    }
  }

  function renderFiles() {
    const container = document.getElementById('allFilesList');
    if (filesCache.length === 0) {
      container.innerHTML = '<div class="empty">No timetable files found.</div>';
      return;
    }
    container.innerHTML = filesCache.map(f => `
      <div class="file-row">
        <div class="file-icon">📄</div>
        <div class="file-info">
          <div class="file-name">${f.name}</div>
          <div class="file-owner">Owner: ${f.owner} · ${f.date}</div>
        </div>
        <button class="action-btn delete" onclick="quickDeleteFile('${f.name}')">Delete</button>
      </div>`).join('');
  }

  async function quickDeleteFile(filename) {
    if (!confirm(`Delete "${filename}"?`)) return;
    try {
      const res  = await fetch(`${API}/timetables/${encodeURIComponent(filename)}`, {
        method: 'DELETE', headers: authHeaders()
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      filesCache = filesCache.filter(f => f.name !== filename);
      renderFiles();
      updateStats();
    } catch (e) { alert('❌ ' + e.message); }
  }

  async function deleteTimetable() {
    const fname = document.getElementById('delTTInput').value.trim();
    if (!fname) return showMsg('del-tt-msg', 'error', '❌ Enter a filename.');
    if (!confirm(`Delete "${fname}"?`)) return;

    const btn = document.getElementById('delTTBtn');
    btn.disabled = true;
    try {
      const res  = await fetch(`${API}/timetables/${encodeURIComponent(fname)}`, {
        method: 'DELETE', headers: authHeaders()
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      filesCache = filesCache.filter(f => f.name !== fname);
      renderFiles();
      updateStats();
      showMsg('del-tt-msg', 'success', '✅ File deleted successfully.');
    } catch (e) {
      showMsg('del-tt-msg', 'error', '❌ ' + e.message);
    } finally { btn.disabled = false; }
  }

  // Load everything on page init
  fetchUsers();
  fetchFiles();
</script>
</body>
</html>
